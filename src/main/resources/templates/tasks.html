<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    .text-strikethrough{
    text-decoration:line-through;
    color:grey;
    }
    body{
    background: linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}
.todo-title{
    margin:15px 0 30px;
    padding:18px;
    color:#fff;
    border:1px solid rgba(255,255,255,0.25);
    border-radius:18px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.container{
    max-width:800px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.card{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:18px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.form-control{
    background:rgba(255,255,255,.2);
    border:none;
    color:white;
    border-radius:15px;
}

.form-control::placeholder{
    color:#e8e8e8;
}

.form-control:focus{
    background:rgba(255,255,255,.25);
    color:white;
    box-shadow:none;
}

.btn-primary{
    background:rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.25);
    color:#fff;
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border-radius:14px;
    transition:all .3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.btn-primary:hover{
    background:rgba(255,255,255,0.35);
    border-color:rgba(255,255,255,0.5);
    color:#fff;
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 12px 28px rgba(0,0,0,.25);
}

.btn-primary:active{
    transform:scale(.97);
}
.btn-primary:hover{
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    border:none;
    color:white;
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(37,117,252,.45);
}
.btn-outline-secondary,
.btn-danger{
    border-radius:12px;
}

h1{
    color:white;
    border:none !important;
}

.text-strikethrough{
    text-decoration:line-through;
    color:#d8d8d8;
}
  </style>
</head>
<body>


<div class="container border mt-4 ">
  <h1 class="todo-title text-center fw-bold">Todo Application</h1>
  <form action="/" method="post" class="row mt-3">
    <div class="col-md-10">
      <input class="form-control form-control-lg" type="text" name="title" placeholder="Add a new task" required>
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary btn-lg btn-block" type="submit">Add</button>
    </div>
  </form>
  <div class="mt-4">
  <th:block th:each="task:${tasks}">
    <div class="card mb-2">
      <div class="card-body d-flex justify-content-between align-items-center">
      <span th:classappend="${task.complete}?'text-strikethrough'" th:text="${task.title}">
        Task Title
      </span>
        <div>
          <a th:href="@{/{id}/toggle(id=${task.id})}" class="btn btn-outline-secondary btn-sm">Toggle</a>
          <a th:href="@{/{id}/delete(id=${task.id})}" class="btn btn-danger btn-sm ml-2">Delete</a>
        </div>
      </div>
    </div>
  </th:block>
  </div>
</div>
</body>
</html>
